name: Install Argo CD - NonProd

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'nonprod'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: nonprod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_NONPROD }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: Install Argo CD
        run: |
          echo "Git ref: $(git rev-parse --abbrev-ref HEAD)"
          echo "Git SHA: $(git rev-parse HEAD)"
          echo "Chart.yaml contents:"
          sed -n '1,120p' platform-argocd/Chart.yaml
          echo "Dependency declaration check:"
          grep -n '^dependencies:' platform-argocd/Chart.yaml || true
          cd platform-argocd
          bash -x ./scripts/install.sh ./environments/nonprod/values.yaml
