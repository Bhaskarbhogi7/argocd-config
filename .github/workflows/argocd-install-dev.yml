name: Install Argo CD - Dev

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: Install Argo CD
        run: |
          set -euo pipefail
          echo "Current kubectl context:"
          kubectl version --client
          kubectl config current-context
          echo "Kubeconfig file:"
          sed -n '1,40p' ~/.kube/config
          echo "Available namespaces:"
          kubectl get namespaces
          echo "Applying Argo CD manifests directly with kubectl"
          cd platform-argocd
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f templates/namespace.yaml --namespace=argocd || true
          for manifest in templates/*.yaml; do
            case "$(basename "$manifest")" in
              namespace.yaml|argocd-project.yaml|ingress.yaml)
                echo "Skipping $(basename "$manifest")"
                continue
                ;;
            esac
            echo "Applying $(basename "$manifest")"
            kubectl apply -f "$manifest" --namespace=argocd
          done
          echo "Namespaces after apply:"
          kubectl get namespaces
          echo "Resources in argocd namespace:"
          kubectl get all -n argocd
