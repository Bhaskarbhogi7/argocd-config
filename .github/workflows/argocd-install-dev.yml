name: Install Argo CD - Dev

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: Install Argo CD
        run: |
          set -euo pipefail
          echo "Applying Argo CD manifests directly with kubectl"
          cd platform-argocd
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f templates/namespace.yaml
          for manifest in templates/*.yaml; do
            if [ "$(basename "$manifest")" = "namespace.yaml" ]; then
              continue
            fi
            echo "Applying $(basename "$manifest")"
            kubectl apply -f "$manifest" -n argocd
          done
